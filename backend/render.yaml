services:
  - type: web
    name: funalytics-live-nav-backend
    runtime: node
    rootDir: main app/backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Asia/Kolkata
      - key: PORT
        value: 10000
      - key: AMFI_URL
        value: https://www.amfiindia.com/spages/NAVAll.txt
      - key: REQUEST_TIMEOUT_MS
        value: 15000
      - key: CACHE_TTL_MS
        value: 60000
      - key: MONGODB_URI
        sync: false
